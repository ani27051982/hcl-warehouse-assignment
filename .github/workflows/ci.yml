name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    name: Build & Test (Maven)
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: hackathon-java-assignment

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Make Maven wrapper executable
        run: chmod +x mvnw

      - name: Maven test (includes JaCoCo report)
        run: ./mvnw -B -ntp test

      - name: Upload JaCoCo HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-html-report
          path: |
            hackathon-java-assignment/target/site/jacoco/**
          if-no-files-found: warn
          retention-days: 7

  warehouse-endpoint-it:
    name: WarehouseEndpointIT (PostgreSQL)
    runs-on: ubuntu-latest
    needs: test
    if: ${{ github.event_name != 'pull_request' }} # keep PRs fast; run on push/manual

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: warehouse
          POSTGRES_USER: warehouse
          POSTGRES_PASSWORD: warehouse
        ports:
          - 15432:5432
        options: >-
          --health-cmd="pg_isready -U warehouse -d warehouse"
          --health-interval=5s
          --health-timeout=3s
          --health-retries=20

    defaults:
      run:
        working-directory: hackathon-java-assignment

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Make Maven wrapper executable
        run: chmod +x mvnw

      - name: Package app (required for @QuarkusIntegrationTest)
        run: ./mvnw -B -ntp package -DskipTests

      - name: Run WarehouseEndpointIT
        env:
          # Test expects PostgreSQL on localhost:15432
          POSTGRES_HOST: localhost
          POSTGRES_PORT: "15432"
        run: ./mvnw -B -ntp test -Dtest=WarehouseEndpointIT

